<!DOCTYPE html>
<html lang="cn">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言发布板</title>
    <style>
        /* 全局样式重置与基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            line-height: 1.6;
        }

        /* 主容器样式 */
        .dv {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* 标题样式 */
        .dv>p:first-child {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        /* 输入框容器 */
        .input-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        /* 输入框样式 */
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #409eff;
            box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.1);
        }

        /* 粘贴按钮样式 */
        .paste-btn {
            background-color: #f0f7ff;
            color: #409eff;
            border: 1px solid #c6e2ff;
            padding: 0 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            white-space: nowrap;
        }

        .paste-btn:hover {
            background-color: #e8f4ff;
        }

        /* 发布按钮样式 */
        button:not(.xx):not(.copy-btn):not(.paste-btn) {
            background-color: #409eff;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 15px;
        }

        button:not(.xx):not(.copy-btn):not(.paste-btn):hover {
            background-color: #337ecc;
        }

        /* 字数统计样式 */
        .dv>p:nth-child(6) {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-bottom: 20px;
        }

        .dv>p:nth-child(6) span {
            color: #409eff;
            font-weight: 600;
        }

        /* 列表样式 */
        ul {
            list-style: none;
            margin-top: 20px;
        }

        li {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        li div {
            display: flex;
            align-items: center;
            width: 100%;
        }

        li img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
        }

        li p {
            flex: 1;
            text-align: left;
            color: #333;
            word-break: break-all;
        }

        .copy-btn {
            background-color: transparent;
            color: #409eff;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 4px;
            margin-right: 8px;
        }

        .xx {
            background-color: transparent;
            color: #ff4949;
            border: none;
            font-size: 16px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        /* 弹窗样式 */
        .token-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .token-modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .token-modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .sync-tip {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 15px;
            background: #52c41a;
            color: white;
            font-size: 12px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .sync-tip.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="dv">
        <p>请发表你的留言</p>
        <div class="input-wrapper">
            <input type="text" maxlength="200" placeholder="输入留言内容...">
            <button class="paste-btn">粘贴</button>
        </div>
        <button id="publishButton">发布</button>
        <p><span>0</span>/200</p>
        <ul id="messageList">
        </ul>
    </div>

    <div class="token-modal" id="tokenModal" style="display: none;">
        <div class="token-modal-content">
            <h3>GitHub Token 配置</h3>
            <div id="tokenError" style="color: red; font-size: 12px; margin-bottom: 10px;"></div>
            <input type="text" id="githubToken" placeholder="输入 GitHub PAT">
            <button onclick="verifyAndSaveToken()">验证并保存</button>
        </div>
    </div>

    <div class="sync-tip" id="syncTip">同步成功</div>

    <script>
        let GITHUB_CONFIG = { token: '', username: '', repo: '', path: '留言.json' };
        const ul = document.getElementById('messageList');
        const input = document.querySelector('input');
        const span = document.querySelector('span');
        const pasteBtn = document.querySelector('.paste-btn');
        const publishBtn = document.getElementById('publishButton');
        const syncTip = document.getElementById('syncTip');

        function g0() { input.value = ''; span.innerHTML = 0; }
        function showSyncTip() { syncTip.classList.add('show'); setTimeout(() => syncTip.classList.remove('show'), 3000); }

        function parseGithubInfoFromUrl() {
            const url = window.location.href;
            const pagesRegex = /https?:\/\/([^.]+)\.github\.io\/([^\/]+)/;
            const repoRegex = /https?:\/\/github\.com\/([^\/]+)\/([^\/]+)/;
            let match = url.match(pagesRegex) || url.match(repoRegex);
            if (match) { GITHUB_CONFIG.username = match[1]; GITHUB_CONFIG.repo = match[2]; return true; }
            alert('URL 无法识别，请确保部署在 GitHub');
            return false;
        }

        async function verifyAndSaveToken() {
            const token = document.getElementById('githubToken').value.trim();
            const response = await fetch('https://api.github.com/user', { headers: { 'Authorization': `token ${token}` } });
            if (response.ok) {
                localStorage.setItem('github_token', token);
                GITHUB_CONFIG.token = token;
                document.getElementById('tokenModal').style.display = 'none';
                initMessages();
            } else {
                document.getElementById('tokenError').textContent = 'Token 无效';
            }
        }

        async function initGithubConfig() {
            if (!parseGithubInfoFromUrl()) return;
            const savedToken = localStorage.getItem('github_token');
            if (savedToken) { GITHUB_CONFIG.token = savedToken; initMessages(); }
            else { document.getElementById('tokenModal').style.display = 'flex'; }
        }

        async function getFileSha() {
            const r = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
                { headers: { 'Authorization': `token ${GITHUB_CONFIG.token}` } });
            return r.ok ? (await r.json()).sha : null;
        }

        async function loadMessages() {
            const r = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
                { headers: { 'Authorization': `token ${GITHUB_CONFIG.token}` } });
            if (r.ok) {
                const data = await r.json();
                return JSON.parse(decodeURIComponent(escape(atob(data.content))));
            }
            return [];
        }

        async function saveMessages(messages) {
            const sha = await getFileSha();
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(messages, null, 2))));
            await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_CONFIG.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'Update', content, sha })
            });
            showSyncTip();
        }

        async function initMessages() {
            const messages = await loadMessages();
            ul.innerHTML = '';
            // 倒序渲染：保持最新的在顶部
            [...messages].reverse().forEach(msg => renderMessageUI(msg));
        }

        function renderMessageUI(content) {
            const li = document.createElement('li');
            li.innerHTML = `<div><img src="https://avatars.githubusercontent.com/u/0?s=24&v=4"><p class="message-text"></p><button class="copy-btn">复制</button><button class="xx">×</button></div>`;
            li.querySelector('.message-text').textContent = content;
            ul.insertBefore(li, ul.firstChild);

            li.querySelector('.copy-btn').onclick = () => {
                navigator.clipboard.writeText(content);
                li.querySelector('.copy-btn').textContent = '已复制';
            };

            li.querySelector('.xx').onclick = async () => {
                li.remove();
                // 重新获取列表并保存
                const current = Array.from(ul.querySelectorAll('.message-text')).map(el => el.textContent);
                await saveMessages(current);
            };
        }

        publishBtn.onclick = async () => {
            const val = input.value.trim();
            if (!val) return;
            renderMessageUI(val);
            g0();
            // 核心修复：按当前 UI 列表顺序（最新在前）提取并直接保存，不进行二次反转
            const current = Array.from(ul.querySelectorAll('.message-text')).map(el => el.textContent);
            await saveMessages(current);
        };

        input.oninput = () => span.innerHTML = input.value.length;
        pasteBtn.onclick = () => navigator.clipboard.readText().then(t => { input.value = t; span.innerHTML = t.length; });
        window.onload = initGithubConfig;
    </script>
</body>

</html>
