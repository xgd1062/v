<!DOCTYPE html>
<html lang="cn">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言发布板</title>
    <style>
        /* 全局样式重置与基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            line-height: 1.6;
        }

        /* 主容器样式 */
        .dv {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* 标题样式 */
        .dv>p:first-child {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        /* 输入框容器：包裹输入框和粘贴按钮 */
        .input-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        /* 输入框样式 */
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #409eff;
            box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.1);
        }

        /* 粘贴按钮样式 */
        .paste-btn {
            background-color: #f0f7ff;
            color: #409eff;
            border: 1px solid #c6e2ff;
            padding: 0 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            white-space: nowrap;
        }

        .paste-btn:hover {
            background-color: #e8f4ff;
        }

        /* 发布按钮样式 */
        button:not(.xx):not(.copy-btn):not(.paste-btn) {
            background-color: #409eff;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 15px;
        }

        button:not(.xx):not(.copy-btn):not(.paste-btn):hover {
            background-color: #337ecc;
        }

        button:not(.xx):not(.copy-btn):not(.paste-btn):active {
            background-color: #266ab9;
        }

        /* 字数统计样式 */
        .dv>p:nth-child(6) {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-bottom: 20px;
        }

        .dv>p:nth-child(6) span {
            color: #409eff;
            font-weight: 600;
        }

        /* 列表样式 */
        ul {
            list-style: none;
            margin-top: 20px;
        }

        li {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        li:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        li div {
            display: flex;
            align-items: center;
            width: 100%;
        }

        /* 头像样式 */
        li img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
        }

        /* 留言内容样式 */
        li p {
            flex: 1;
            text-align: left;
            color: #333;
            word-break: break-all;
        }

        /* 复制按钮样式 */
        .copy-btn {
            background-color: transparent;
            color: #409eff;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 4px;
            margin-right: 8px;
            transition: background-color 0.2s ease;
        }

        .copy-btn:hover {
            background-color: #e8f4ff;
        }

        /* 删除按钮样式 */
        .xx {
            background-color: transparent;
            color: #ff4949;
            border: none;
            font-size: 16px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            transition: background-color 0.2s ease;
        }

        .xx:hover {
            background-color: #ffeaea;
        }

        /* Token输入弹窗样式 */
        .token-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .token-modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .token-modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .token-modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .token-modal-content button {
            padding: 10px 20px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .token-modal-content .error {
            color: #ff4949;
            margin-bottom: 15px;
            font-size: 12px;
        }

        /* 同步成功提示悬窗样式 */
        .sync-tip {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 15px;
            background: #52c41a;
            color: white;
            font-size: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 9998;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .sync-tip.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="dv">
        <p>请发表你的留言</p>
        <div class="input-wrapper">
            <input type="text" maxlength="200" placeholder="输入留言内容...">
            <button class="paste-btn">粘贴</button>
        </div>
        <button>发布</button>
        <p><span>0</span>/200</p>
        <ul>
        </ul>
    </div>

    <div class="token-modal" id="tokenModal" style="display: none;">
        <div class="token-modal-content">
            <h3>请输入GitHub Personal Access Token</h3>
            <div class="error" id="tokenError"></div>
            <input type="text" id="githubToken" placeholder="输入你的GitHub PAT（仅存储在本地）">
            <button onclick="verifyAndSaveToken()">验证并保存</button>
        </div>
    </div>

    <div class="sync-tip" id="syncTip">同步成功</div>

    <script>
        // ===================== 全局变量与基础函数 =====================
        let GITHUB_CONFIG = {
            token: '',
            username: '',
            repo: '',
            path: '留言.json'
        };
        const ul = document.querySelector('ul');
        const input = document.querySelector('input');
        const span = document.querySelector('span');
        const pasteBtn = document.querySelector('.paste-btn');
        const publishBtn = document.querySelector('button:not(.paste-btn):not(.copy-btn):not(.xx)');
        const syncTip = document.getElementById('syncTip');

        // 清空输入框
        function g0() {
            input.value = '';
            span.innerHTML = 0;
        }

        // 显示同步成功提示
        function showSyncTip() {
            syncTip.classList.add('show');
            setTimeout(() => {
                syncTip.classList.remove('show');
            }, 3000);
        }

        // ===================== GitHub 信息解析与Token管理 =====================
        function parseGithubInfoFromUrl() {
            const url = window.location.href;
            const pagesRegex = /https?:\/\/([^.]+)\.github\.io\/([^\/]+)/;
            const repoRegex = /https?:\/\/github\.com\/([^\/]+)\/([^\/]+)/;

            let username = '';
            let repo = '';

            if (pagesRegex.test(url)) {
                const match = url.match(pagesRegex);
                username = match[1];
                repo = match[2];
            } else if (repoRegex.test(url)) {
                const match = url.match(repoRegex);
                username = match[1];
                repo = match[2];
            }

            if (!username || !repo) {
                alert('无法从URL解析GitHub用户名/仓库名，请确认页面部署在GitHub Pages或仓库中');
                return false;
            }

            GITHUB_CONFIG.username = username;
            GITHUB_CONFIG.repo = repo;
            return true;
        }

        async function verifyToken(token) {
            try {
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                return response.ok;
            } catch (err) {
                console.error('Token验证失败：', err);
                return false;
            }
        }

        async function verifyAndSaveToken() {
            const tokenInput = document.getElementById('githubToken');
            const tokenError = document.getElementById('tokenError');
            const token = tokenInput.value.trim();

            if (!token) {
                tokenError.textContent = '请输入有效的GitHub Token';
                return;
            }

            const isValid = await verifyToken(token);
            if (!isValid) {
                tokenError.textContent = 'Token无效，请检查后重新输入（需包含repo权限）';
                return;
            }

            localStorage.setItem('github_token', token);
            GITHUB_CONFIG.token = token;

            document.getElementById('tokenModal').style.display = 'none';
            await initMessages();
        }

        // 修复点 1：定义初始化函数
        async function initGithubConfig() {
            if (!parseGithubInfoFromUrl()) return;

            const savedToken = localStorage.getItem('github_token');
            if (savedToken) {
                GITHUB_CONFIG.token = savedToken;
                await initMessages();
            } else {
                document.getElementById('tokenModal').style.display = 'flex';
            }
        }

        // ===================== GitHub API 交互逻辑 =====================
        async function getFileSha() {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
                    {
                        headers: {
                            'Authorization': `token ${GITHUB_CONFIG.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                if (response.ok) {
                    const data = await response.json();
                    return data.sha;
                } else if (response.status === 404) {
                    return null;
                } else {
                    throw new Error(`获取文件SHA失败：${response.status}`);
                }
            } catch (err) {
                console.error('获取SHA失败：', err);
                return null;
            }
        }

        async function loadMessages() {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
                    {
                        headers: {
                            'Authorization': `token ${GITHUB_CONFIG.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                if (response.ok) {
                    const data = await response.json();
                    const content = atob(data.content.replace(/\n/g, ''));
                    const messages = JSON.parse(decodeURIComponent(escape(content)));
                    return Array.isArray(messages) ? messages : [];
                } else if (response.status === 404) {
                    return [];
                } else {
                    throw new Error(`读取留言失败：${response.status}`);
                }
            } catch (err) {
                console.error('读取留言失败：', err);
                return [];
            }
        }

        async function saveMessages(messages) {
            try {
                const sha = await getFileSha();
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(messages, null, 2))));
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_CONFIG.username}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${GITHUB_CONFIG.token}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: '更新留言板数据',
                            content: content,
                            sha: sha
                        })
                    }
                );
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(`保存失败：${errData.message || response.status}`);
                }
                showSyncTip();
            } catch (err) {
                console.error('保存留言失败：', err);
                alert('保存留言失败：' + err.message);
            }
        }

        // ===================== 留言渲染与事件绑定 =====================
        async function initMessages() {
            const messages = await loadMessages();
            ul.innerHTML = '';
            const reversedMessages = [...messages].reverse();
            reversedMessages.forEach(msg => {
                renderMessageItem(msg);
            });
        }

        // 修复点 2：使用 textContent 防止 XSS 攻击
        function renderMessageItem(content) {
            const li = document.createElement('li');
            li.innerHTML = `<div>
                <img src="https://avatars.githubusercontent.com/u/0?s=24&v=4" alt="头像">
                <p class="message-text"></p>   
                <button class='copy-btn'>复制</button>
                <button class='xx'>×</button>
            </div>`;
            
            li.querySelector('.message-text').textContent = content;
            ul.insertBefore(li, ul.firstChild);

            const copyBtn = li.querySelector('.copy-btn');
            const messageText = li.querySelector('.message-text');
            copyBtn.addEventListener('click', () => copyText(messageText, copyBtn));

            const xxBtn = li.querySelector('.xx');
            xxBtn.addEventListener('click', async () => {
                ul.removeChild(li);
                const currentMessages = Array.from(ul.querySelectorAll('.message-text')).map(el => el.textContent.trim());
                await saveMessages(currentMessages.reverse());
            });
        }

        function copyText(element, btn) {
            const text = element.textContent.trim();
            if (!text) return;

            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showCopySuccess(btn);
                }).catch(() => {
                    fallbackCopyText(text, btn);
                });
            } else {
                fallbackCopyText(text, btn);
            }
        }

        function showCopySuccess(btn) {
            const originalText = btn.innerText;
            btn.innerText = "已复制";
            btn.style.color = "#52c41a";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = "#409eff";
            }, 2000);
        }

        function fallbackCopyText(text, btn) {
            const tempInput = document.createElement('input');
            tempInput.value = text;
            tempInput.style.position = 'absolute';
            tempInput.style.left = '-9999px';
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand('copy');
                showCopySuccess(btn);
            } catch (err) {
                alert("复制失败");
            } finally {
                document.body.removeChild(tempInput);
            }
        }

        function pasteToInput(inputEl) {
            if (navigator.clipboard) {
                navigator.clipboard.readText().then((text) => {
                    if (text) {
                        const limitedText = text.substring(0, 200);
                        inputEl.value = limitedText;
                        span.innerHTML = limitedText.length;
                    }
                }).catch((err) => {
                    console.error("粘贴失败");
                });
            }
        }

        // ===================== 事件绑定 =====================
        input.addEventListener('input', () => {
            span.innerHTML = input.value.length;
        });

        pasteBtn.addEventListener('click', () => {
            pasteToInput(input);
        });

        publishBtn.addEventListener('click', async () => {
            const content = input.value.trim();
            if (!content) {
                g0();
                return;
            }

            renderMessageItem(content);
            g0();

            const currentMessages = Array.from(ul.querySelectorAll('.message-text')).map(el => el.textContent.trim());
            await saveMessages(currentMessages.reverse());
        });

        input.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                publishBtn.click();
            }
        });

        window.onload = initGithubConfig;
    </script>
</body>

</html>
