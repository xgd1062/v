<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="001.css">
    <title>首页</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .div1 {
        background: linear-gradient(to right top, #65dfc9, #6cdbeb);
        height: 840px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;

    }

    .glass {
        height: 600px;
        background: white;
        /* width: 60%; */
        background: linear-gradient(to right bottom, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.3));
        border-radius: 1rem;
        z-index: 2;
        backdrop-filter: blur(1rem);
        overflow: hidden;
    }

    .img1 {
        float: left;
        height: 100%;
    }

    .img2 {
        float: right;
        height: 100%;
    }
</style>

<body>
    <script>
        let div1 = document.createElement('div')          //创建节点
        div1.classList.add('div1')                       //添加class类名
        div1.innerHTML = `<div class="glass"></div>`    //添加内容
        let body = document.querySelector('body')      //获取某页面
        body.appendChild(div1)                        //加到页面上
        ////////////////////////////////////////////////////////////////////////////////////
        let img1 = document.createElement('img')          //创建节点
        let img2 = document.createElement('img')          //创建节点
        img1.classList.add('img1')                       //添加class类名
        img2.classList.add('img2')                       //添加class类名
        img1.src = `20230110_7456/1.jpg`                //添加内容
        img2.src = `20230111_0658/1.jpg`                //添加内容
        let div2 = document.querySelector('.glass')    //获取某页面
        div2.appendChild(img1)                        //加到页面上
        div2.appendChild(img2)                        //加到页面上
    </script>
    <script src="自动轮播 + 倒计时 v1.0.js"></script>
</body>

</html>
