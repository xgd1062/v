<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双路无限循环幻灯片 - 纠错自适应版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .div1 {
            background: linear-gradient(to right top, #65dfc9, #6cdbeb);
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            position: relative;
            height: 600px;
            width: 80%;
            max-width: 1000px;
            background: linear-gradient(to right bottom, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.3));
            border-radius: 1rem;
            z-index: 2;
            backdrop-filter: blur(1rem);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
        }

        .img1,
        .img2 {
            height: 100%;
            width: 50%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body>
    <script>
        // 1. 构建 DOM 结构
        const divContainer = document.createElement('div');
        divContainer.className = 'div1';
        divContainer.innerHTML = `<div class="glass"></div>`;
        document.body.appendChild(divContainer);

        const imageLeft = document.createElement('img');
        const imageRight = document.createElement('img');
        imageLeft.className = 'img1';
        imageRight.className = 'img2';

        const glassBox = document.querySelector('.glass');
        glassBox.appendChild(imageLeft);
        glassBox.appendChild(imageRight);

        // 2. 状态变量 (准则4 & 8: 严格审查变量名)
        let g1_idx = 1;
        let g2_idx = 1;

        // 3. 核心纠错逻辑：当图片加载失败时，重置为第一张
        // 这实现了无需知道总数也能无限循环的效果
        imageLeft.onerror = function () {
            console.log("图库1已达上限，重置为1");
            g1_idx = 1;
            this.src = `图库1/${g1_idx}.jpg`;
        };

        imageRight.onerror = function () {
            console.log("图库2已达上限，重置为1");
            g2_idx = 1;
            this.src = `图库2/${g2_idx}.jpg`;
        };

        // 4. 初始化显示
        imageLeft.src = `图库1/${g1_idx}.jpg`;
        imageRight.src = `图库2/${g2_idx}.jpg`;

        // 5. 独立循环函数
        function loopLeft() {
            g1_idx++;
            imageLeft.src = `图库1/${g1_idx}.jpg`;
        }

        function loopRight() {
            g2_idx++;
            imageRight.src = `图库2/${g2_idx}.jpg`;
        }

        // 6. 开启定时器
        setInterval(loopLeft, 2500);
        setInterval(loopRight, 2500);
    </script>
</body>

</html>
